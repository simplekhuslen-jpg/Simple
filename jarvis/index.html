<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jarvis</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14;
      --bg2: #141720;
      --bg3: #1c2030;
      --border: #2a2f42;
      --blue: #4f8ef7;
      --blue-dark: #1e3a6e;
      --text: #e8eaf0;
      --text2: #8892a4;
      --red: #e24b4a;
      --green: #3ecf8e;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #app {
      width: 480px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 8px 0;
    }
    .orb {
      width: 80px; height: 80px;
      border-radius: 50%;
      margin: 0 auto 14px;
      background: radial-gradient(circle at 35% 35%, #4f8ef7, #1a2a6c);
      position: relative;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 30px #4f8ef740;
      transition: box-shadow 0.3s;
    }
    .orb.listening { box-shadow: 0 0 50px #e24b4a80, 0 0 100px #e24b4a30; }
    .orb.speaking  { box-shadow: 0 0 50px #4f8ef780, 0 0 100px #4f8ef730; }
    .orb svg { width: 34px; height: 34px; }
    .pulse {
      position: absolute; border-radius: 50%;
      border: 1.5px solid var(--blue);
      opacity: 0; animation: none;
      top: 0; left: 0; width: 100%; height: 100%;
    }
    .orb.listening .pulse { animation: ripple 1.4s ease-out infinite; }
    .pulse:nth-child(2) { animation-delay: 0.5s !important; }
    @keyframes ripple {
      0%   { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(2); opacity: 0; }
    }
    .orb.listening .pulse { border-color: var(--red); }
    h1 { font-size: 22px; font-weight: 600; letter-spacing: 4px; color: var(--text); }
    .status { font-size: 13px; color: var(--text2); margin-top: 4px; height: 18px; }

    /* Chat */
    .chat {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      height: 300px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .msg { display: flex; gap: 10px; align-items: flex-end; }
    .msg.user { flex-direction: row-reverse; }
    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
    }
    .msg.ai   .bubble { background: var(--bg3); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .msg.user .bubble { background: var(--blue); color: #fff; border-bottom-right-radius: 4px; }
    .msg.command .bubble { background: var(--blue-dark); border: 1px solid var(--blue); color: var(--blue); font-size: 13px; border-bottom-left-radius: 4px; }
    .av {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--bg3); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
    }
    .typing { display: flex; gap: 5px; padding: 6px 2px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text2); animation: bob 1.1s infinite; }
    .dot:nth-child(2) { animation-delay: .18s; }
    .dot:nth-child(3) { animation-delay: .36s; }
    @keyframes bob { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* Controls */
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .mic-btn {
      width: 52px; height: 52px; border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--bg2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s; flex-shrink: 0;
      color: var(--text);
    }
    .mic-btn:hover { background: var(--bg3); border-color: var(--blue); }
    .mic-btn.active { background: var(--red); border-color: var(--red); color: #fff; }
    .text-input {
      flex: 1; padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--text);
      font-size: 14px; outline: none;
      font-family: inherit;
      transition: border-color .2s;
    }
    .text-input:focus { border-color: var(--blue); }
    .text-input::placeholder { color: var(--text2); }
    .send-btn {
      padding: 0 20px; height: 52px;
      border-radius: 12px;
      background: var(--blue); color: #fff;
      border: none; cursor: pointer;
      font-size: 14px; font-weight: 600;
      font-family: inherit;
      transition: opacity .2s; flex-shrink: 0;
    }
    .send-btn:hover { opacity: .85; }
    .send-btn:disabled { opacity: .35; cursor: not-allowed; }

    /* Settings panel */
    .settings-toggle {
      text-align: center;
      font-size: 12px; color: var(--text2);
      cursor: pointer; user-select: none;
    }
    .settings-toggle:hover { color: var(--text); }
    .settings {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      display: none;
      flex-direction: column;
      gap: 10px;
    }
    .settings.open { display: flex; }
    .settings label { font-size: 12px; color: var(--text2); margin-bottom: 4px; display: block; }
    .settings input {
      width: 100%; padding: 8px 12px;
      border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg3); color: var(--text);
      font-size: 13px; outline: none; font-family: inherit;
    }
    .settings input:focus { border-color: var(--blue); }
    .save-btn {
      padding: 8px 18px; border-radius: 8px;
      background: var(--green); color: #0d0f14;
      border: none; cursor: pointer;
      font-size: 13px; font-weight: 600; align-self: flex-end;
    }
    .hint {
      text-align: center; font-size: 12px; color: var(--text2);
    }
    .wake-badge {
      display: flex; align-items: center; justify-content: center;
      gap: 7px; font-size: 12px; color: var(--text2);
    }
    .wake-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text2); flex-shrink: 0; transition: background .3s;
    }
    .wake-dot.on  { background: var(--green); animation: glow 2s infinite; }
    .wake-dot.off { background: #e24b4a44; animation: none; }
    @keyframes glow { 0%,100%{opacity:1} 50%{opacity:.4} }
    .api-badge {
      display: inline-block;
      padding: 2px 8px; border-radius: 999px;
      font-size: 11px; font-weight: 600;
      background: #e24b4a22; color: var(--red); border: 1px solid var(--red);
      margin-left: 6px;
    }
    .api-badge.ok { background: #3ecf8e22; color: var(--green); border-color: var(--green); }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="orb" id="orb">
      <div class="pulse"></div>
      <div class="pulse"></div>
      <svg viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="17" cy="17" r="15" fill="#1a2a6c" opacity="0.6"/>
        <path d="M17 8a4 4 0 0 1 4 4v5a4 4 0 0 1-8 0v-5a4 4 0 0 1 4-4z" fill="#4f8ef7"/>
        <path d="M11 17a6 6 0 0 0 12 0" stroke="#4f8ef7" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <line x1="17" y1="23" x2="17" y2="27" stroke="#4f8ef7" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="14" y1="27" x2="20" y2="27" stroke="#4f8ef7" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>JARVIS</h1>
    <div class="status" id="status">Ready</div>
  </div>

  <div class="chat" id="chat">
    <div class="msg ai">
      <div class="av">🤖</div>
      <div class="bubble">Hello! I'm Jarvis. Say a command or ask me anything. Try: <strong>"Open VS Code"</strong>, <strong>"Open Axiom Trade"</strong>, or <strong>"Play music"</strong>.</div>
    </div>
  </div>

  <div class="controls">
    <button class="mic-btn" id="mic-btn" title="Hold to speak (or click)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <input class="text-input" id="text-input" placeholder="Type a command or question..." />
    <button class="send-btn" id="send-btn">Send</button>
  </div>

  <div class="hint" id="hint">🎤 Click mic and speak — or type below</div>
  <div class="wake-badge">
    <div class="wake-dot" id="wake-dot"></div>
    <span id="wake-label">Wake word off</span>
  </div>

  <div class="settings-toggle" id="settings-toggle">⚙️ Settings <span class="api-badge" id="api-badge">No API Key</span></div>
  <div class="settings" id="settings">
    <div>
      <label>Anthropic API Key (for AI chat)</label>
      <input type="password" id="api-key-input" placeholder="sk-ant-..." />
    </div>
    <div>
      <label>Music Folder (optional — leave blank to use YouTube Music)</label>
      <input type="text" id="music-folder-input" placeholder="C:\Users\You\Music" />
    </div>
    <button class="save-btn" id="save-btn">Save</button>
  </div>
</div>

<script>
const chatEl     = document.getElementById('chat');
const micBtn     = document.getElementById('mic-btn');
const sendBtn    = document.getElementById('send-btn');
const textInput  = document.getElementById('text-input');
const statusEl   = document.getElementById('status');
const orbEl      = document.getElementById('orb');
const hintEl     = document.getElementById('hint');
const apiBadge   = document.getElementById('api-badge');

let isRecording   = false;
let recognition   = null;
let utterance     = null;
let history       = [];
let wakeRec       = null;
let wakeActive    = false;
let wakeEnabled   = false;

const wakeDot   = document.getElementById('wake-dot');
const wakeLabel = document.getElementById('wake-label');

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SR) {
  hintEl.textContent = '⌨️ Browser does not support speech. Type your commands.';
  micBtn.disabled = true; micBtn.style.opacity = '0.3';
}

// ── Wake word ────────────────────────────────────────────────────────────────
function setWakeUI(on) {
  wakeEnabled = on;
  wakeDot.className = 'wake-dot ' + (on ? 'on' : 'off');
  wakeLabel.textContent = on ? 'Listening for "Hey Claude"...' : 'Wake word off';
}

function startWakeWord() {
  if (!SR || isRecording || wakeActive) return;
  try {
    wakeRec = new SR();
    wakeRec.continuous = false;
    wakeRec.interimResults = false;
    wakeRec.lang = 'en-US';

    wakeRec.onresult = (e) => {
      const t = e.results[0][0].transcript.toLowerCase().trim();
      if (t.includes('hey claude') || t.includes('hey jarvis')) {
        onWakeWord(t);
      }
    };

    wakeRec.onerror = () => {
      wakeActive = false;
      if (wakeEnabled && !isRecording) setTimeout(startWakeWord, 800);
    };

    wakeRec.onend = () => {
      wakeActive = false;
      if (wakeEnabled && !isRecording) setTimeout(startWakeWord, 300);
    };

    wakeRec.start();
    wakeActive = true;
  } catch {
    wakeActive = false;
    if (wakeEnabled) setTimeout(startWakeWord, 1000);
  }
}

function onWakeWord(fullPhrase) {
  wakeActive = false;
  // Check if the command is embedded in the wake phrase itself
  // e.g. "hey claude let's start" → extract "let's start"
  const afterWake = fullPhrase
    .replace(/hey (claude|jarvis)/i, '')
    .trim();

  if (afterWake.length > 2) {
    // Command was spoken in the same breath
    send(afterWake);
    if (wakeEnabled) setTimeout(startWakeWord, 1000);
  } else {
    // Just the wake word — activate mic and wait for command
    speak("Yes?");
    setTimeout(() => startListening(true), 600);
  }
}

function startListening(afterWake = false) {
  if (!SR || isRecording) return;
  window.speechSynthesis?.cancel();

  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isRecording = true;
    micBtn.classList.add('active');
    setStatus('Listening...', 'listening');
    hintEl.textContent = '🔴 Click mic again to stop';
    if (afterWake) wakeDot.className = 'wake-dot';
  };

  recognition.onresult = (e) => {
    const t = e.results[0][0].transcript;
    send(t);
  };

  recognition.onerror = (e) => {
    if (e.error !== 'aborted') addMsg('ai', `Mic error: ${e.error}. Try typing instead.`);
  };

  recognition.onend = () => {
    isRecording = false;
    micBtn.classList.remove('active');
    setStatus('Ready', '');
    hintEl.textContent = '🎤 Click mic and speak — or type below';
    if (wakeEnabled) setTimeout(startWakeWord, 400);
  };

  recognition.start();
}

// Short click → start/stop listening
// Long press (600ms) → toggle always-on wake word
let micLongPressed = false;
let micPressTimer  = null;

micBtn.addEventListener('mousedown', () => {
  micLongPressed = false;
  micPressTimer = setTimeout(() => {
    micLongPressed = true;
    if (wakeEnabled) {
      wakeRec?.stop();
      wakeActive = false;
      setWakeUI(false);
      addMsg('ai', 'Wake word disabled. Click mic to listen manually.');
    } else {
      setWakeUI(true);
      startWakeWord();
      addMsg('ai', 'Wake word enabled! Say "Hey Claude" anytime to activate me.');
      speak('Wake word enabled. Say Hey Claude to activate me.');
    }
  }, 600);
});
micBtn.addEventListener('mouseup',    () => clearTimeout(micPressTimer));
micBtn.addEventListener('mouseleave', () => clearTimeout(micPressTimer));

// Load config state & verify server is reachable
fetch('/config')
  .then(r => r.json())
  .then(cfg => {
    apiBadge.textContent = cfg.hasApiKey ? 'AI Ready' : 'No API Key';
    apiBadge.className   = 'api-badge' + (cfg.hasApiKey ? ' ok' : '');
    if (cfg.musicFolder) document.getElementById('music-folder-input').value = cfg.musicFolder;
    if (!cfg.hasApiKey) {
      addMsg('ai', '⚙️ No API key set yet. Click Settings → enter your Anthropic key → Save. Commands like "open VS Code" work without a key.');
    }
  })
  .catch(() => {
    addMsg('ai', '❌ Cannot reach server! Open START JARVIS.bat first, then refresh this page.');
    setStatus('Server offline', '');
  });

// Settings toggle
document.getElementById('settings-toggle').addEventListener('click', () => {
  document.getElementById('settings').classList.toggle('open');
});

document.getElementById('save-btn').addEventListener('click', () => {
  const key    = document.getElementById('api-key-input').value.trim();
  const folder = document.getElementById('music-folder-input').value.trim();
  const btn    = document.getElementById('save-btn');
  btn.textContent = 'Saving...'; btn.disabled = true;
  fetch('/config', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ anthropicApiKey: key, musicFolder: folder })
  })
  .then(r => { if (!r.ok) throw new Error('Server error ' + r.status); return r.json(); })
  .then(() => {
    apiBadge.textContent = key ? 'AI Ready' : 'No API Key';
    apiBadge.className   = 'api-badge' + (key ? ' ok' : '');
    document.getElementById('settings').classList.remove('open');
    addMsg('ai', '✅ API key saved! You can now chat with AI.');
  })
  .catch(err => {
    addMsg('ai', `❌ Save failed: ${err.message}. Make sure START JARVIS.bat is running.`);
  })
  .finally(() => { btn.textContent = 'Save'; btn.disabled = false; });
});

// ── UI helpers ───────────────────────────────────────────────────────────────
function addMsg(role, text) {
  const wrap  = document.createElement('div');
  wrap.className = 'msg ' + role;
  const av = document.createElement('div');
  av.className = 'av';
  av.textContent = role === 'user' ? '👤' : (role === 'command' ? '⚡' : '🤖');
  const b = document.createElement('div');
  b.className = 'bubble';
  b.textContent = text;
  if (role === 'user') { wrap.appendChild(b); wrap.appendChild(av); }
  else                 { wrap.appendChild(av); wrap.appendChild(b); }
  chatEl.appendChild(wrap);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg ai'; wrap.id = 'typing';
  const av = document.createElement('div'); av.className = 'av'; av.textContent = '🤖';
  const b = document.createElement('div'); b.className = 'bubble';
  b.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  wrap.appendChild(av); wrap.appendChild(b);
  chatEl.appendChild(wrap); chatEl.scrollTop = chatEl.scrollHeight;
}
function hideTyping() { document.getElementById('typing')?.remove(); }

function setStatus(text, mode) {
  statusEl.textContent = text;
  orbEl.className = 'orb ' + (mode || '');
}

// Cache voices once they load — Chrome returns [] on first call
let cachedVoices = [];
function loadVoices() {
  const v = window.speechSynthesis.getVoices();
  if (v.length) cachedVoices = v;
}
window.speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  // Chrome needs resume() after cancel() or it stays paused
  window.speechSynthesis.resume();

  const doSpeak = () => {
    if (!cachedVoices.length) cachedVoices = window.speechSynthesis.getVoices();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 1.0;
    const preferred = cachedVoices.find(v =>
      v.name.includes('David') || v.name.includes('Zira') ||
      (v.lang.startsWith('en') && v.localService)
    );
    if (preferred) u.voice = preferred;
    u.onstart = () => setStatus('Speaking...', 'speaking');
    u.onend   = () => setStatus('Ready', '');
    utterance = u;
    window.speechSynthesis.speak(u);
  };

  // Small delay so Chrome doesn't block speech after async fetch
  setTimeout(doSpeak, 50);
}

// ── Send command ─────────────────────────────────────────────────────────────
async function send(text) {
  if (!text.trim()) return;
  // Unlock speech synthesis within user gesture context before async work
  window.speechSynthesis?.resume();
  addMsg('user', text);
  sendBtn.disabled = true;
  setStatus('Processing...', '');
  showTyping();

  try {
    const res  = await fetch('/command', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, history })
    });
    const data = await res.json();
    hideTyping();

    const role = data.type === 'command' ? 'command' : 'ai';
    addMsg(role, data.response);
    speak(data.response);

    if (data.type === 'chat') {
      history.push({ role: 'user', content: text });
      history.push({ role: 'assistant', content: data.response });
      if (history.length > 20) history = history.slice(-20);
    }
  } catch {
    hideTyping();
    addMsg('ai', 'Server not reachable. Make sure server.js is running.');
  }

  sendBtn.disabled = false;
  setStatus('Ready', '');
}

sendBtn.addEventListener('click', () => { send(textInput.value); textInput.value = ''; });
textInput.addEventListener('keydown', e => { if (e.key === 'Enter') { send(textInput.value); textInput.value = ''; } });

// ── Mic click (short press) ───────────────────────────────────────────────────
micBtn.addEventListener('click', () => {
  if (micLongPressed) return;
  if (!SR) return;
  if (isRecording) { recognition?.stop(); return; }
  startListening();
});

window.speechSynthesis?.addEventListener('voiceschanged', () => {});
</script>
</body>
</html>
